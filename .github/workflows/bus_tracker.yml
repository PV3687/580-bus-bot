# .github/workflows/bus_tracker.yml
name: Across Bus Multi-Tracker

on:
  # 1. 接受外部 cron-job.org API 準時觸發
  repository_dispatch:
    types: [trigger-from-cronjob]
    
  # 2. 依舊保留網頁手動觸發，方便你隨時測試
  workflow_dispatch: 

# 3. 強制防撞排隊機制：確保同一時間只有一個循環在跑，上一個沒跑完，下一個會乖乖排隊
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  run-trackers:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 賦予 GitHub Actions 修改與寫入數據庫檔案（Push）的權限

    steps:
      - name: 檢出儲存庫 (Checkout Repository)
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝所需套件 (Dependencies)
        run: pip install requests beautifulsoup4

      - name: 執行指定的所有巴士追蹤程式
        env:
          DISCORD_WEBHOOK_NWFB_55XX: ${{ secrets.DISCORD_WEBHOOK_NWFB_55XX }}
          DISCORD_WEBHOOK_NWFB_40XX: ${{ secrets.DISCORD_WEBHOOK_NWFB_40XX }}
          DISCORD_WEBHOOK_CTB_81XX: ${{ secrets.DISCORD_WEBHOOK_CTB_81XX }}
          DISCORD_WEBHOOK_KMB_ATEU: ${{ secrets.DISCORD_WEBHOOK_KMB_ATEU }}
          DISCORD_WEBHOOK_KMB_ATEE: ${{ secrets.DISCORD_WEBHOOK_KMB_ATEE }}
          DISCORD_WEBHOOK_LWB_84XX: ${{ secrets.DISCORD_WEBHOOK_LWB_84XX }}
          DISCORD_WEBHOOK_MTR_8XX_12: ${{ secrets.DISCORD_WEBHOOK_MTR_8XX_12 }}
          DISCORD_WEBHOOK_MTR_8XX_11_3: ${{ secrets.DISCORD_WEBHOOK_MTR_8XX_11_3 }}
          DISCORD_WEBHOOK_CTB_580: ${{ secrets.DISCORD_WEBHOOK_CTB_580 }}
        run: |
          # 明確指定執行 9 個 Python 檔案
          # 末尾加上「&」使其在背景同時並行運作，每分鐘獨立更新行蹤
          
          if [ -f "ctb_580.py" ]; then python ctb_580.py & fi
          if [ -f "ctb_81xx.py" ]; then python ctb_81xx.py & fi
          if [ -f "kmb_atee.py" ]; then python kmb_atee.py & fi
          if [ -f "kmb_ateu.py" ]; then python kmb_ateu.py & fi
          if [ -f "lwb_84xx.py" ]; then python lwb_84xx.py & fi
          if [ -f "mtr_8xx_11_3.py" ]; then python mtr_8xx_11_3.py & fi
          if [ -f "mtr_8xx_12.py" ]; then python mtr_8xx_12.py & fi
          if [ -f "nwfb_40xx.py" ]; then python nwfb_40xx.py & fi
          if [ -f "nwfb_55xx.py" ]; then python nwfb_55xx.py & fi
          
          # wait 指令會在這裡卡住，直到上方所有背景執行的 Python 程式結束（即 3 小時 55 分鐘後）
          wait

      - name: 自動保存所有專屬數據庫 (Save All Tracked Databases)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 這裡同樣將 git add 明確指定為這 9 個檔案所對應產生的 JSON 數據庫
          # 格式為 db_route_[檔案名].json 或 db_fleet_[檔案名].json （依你 Python 內的命名而定）
          # 為防萬一，這裡依舊採用 *.json 保障所有生成的數據庫都能打包成功且不衝突
          git add *.json || echo "暫時沒有任何數據庫檔案，忽略"
          git commit -m "Auto-update bus tracking databases [Skip CI]" || echo "今日數據沒有變更"
          git push
