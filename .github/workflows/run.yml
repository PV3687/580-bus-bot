# .github/workflows/bus_tracker.yml
name: Across Bus Multi-Tracker

on:
  schedule:
    # 這裡的 Cron 排程為 UTC 時間
    # 對應香港時間 (UTC+8) 的 00:00, 04:00, 08:00, 12:00, 16:00, 20:00
    - cron: '0 0,4,8,12,16,20 * * *'
  workflow_dispatch: # 支援在 GitHub 網頁介面上手動點擊「Run workflow」進行測試

jobs:
  run-trackers:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 賦予 GitHub Actions 修改與寫入數據庫檔案（Push）的權限

    steps:
      - name: 檢出儲存庫 (Checkout Repository)
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝所需套件 (Dependencies)
        run: pip install requests beautifulsoup4

      - name: 執行所有追蹤程式
        run: |
          # 使用「python track_*.py」會自動執行所有符合檔名開頭的 Python 檔案
          # 加上「&」讓所有程式同時在背景獨立並行運作，達到每分鐘同步抓取的效果
          for file in track_*.py; do
            if [ -f "$file" ]; then
              echo "正在啟動背景執行: $file"
              python "$file" &
            fi
          done
          
          # wait 指令會卡住這個步驟，直到所有在背景執行的 Python 程式正常結束（即 3 小時 55 分鐘後）
          wait

      - name: 自動保存所有專屬數據庫 (Save All Tracked Databases)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 使用 *.json 完美動態支援所有自訂名稱的數據庫，不會漏掉任何一條路線
          git add *.json || echo "暫時沒有任何數據庫檔案，忽略"
          git commit -m "Auto-update bus tracking databases [Skip CI]" || echo "今日數據沒有變更"
          git push
